name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict mode gate — see clockly-code-review skill)
        run: npx tsc -b

      - name: Lint (oxlint — see clockly-code-review skill)
        run: npx oxlint

      - name: Unit tests (calc engine edge cases — see clockly-code-review skill)
        run: npx vitest run

      - name: Production build (bundle size + code-splitting — see performance-review skill)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-only

      - name: Report bundle sizes
        run: |
          echo "### Bundle sizes" >> $GITHUB_STEP_SUMMARY
          du -h dist/assets/*.js | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (see dependency-health skill)
        run: npm audit --audit-level=high
